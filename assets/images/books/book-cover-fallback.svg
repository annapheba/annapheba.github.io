<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450" role="img" aria-labelledby="title desc">
  <title id="title">Book cover placeholder</title>
  <desc id="desc">A decorative fallback image used when a book cover cannot be loaded.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e8d5" />
      <stop offset="100%" stop-color="#d8c2a1" />
    </linearGradient>
  </defs>
  <rect width="300" height="450" fill="url(#bg)" />
  <rect x="20" y="20" width="260" height="410" rx="8" ry="8" fill="none" stroke="#8a6a3f" stroke-width="2" stroke-dasharray="7 6" />
  <path d="M92 150h116v8H92zm0 24h116v8H92zm0 24h84v8H92z" fill="#6b5334" opacity="0.85" />
  <text x="150" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="25" fill="#4d3b24">Book Cover</text>
  <text x="150" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5e4a2f">Image unavailable</text>
</svg>
